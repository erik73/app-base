---
name: Deploy

# yamllint disable-line rule:truthy
on:
  push:
    branches:
      - main
  release:
    types:
      - published

permissions:
  actions: read
  contents: read
  packages: write
  security-events: write

jobs:
  ci:
    uses: erik73/workflows/.github/workflows/base-ci.yaml@33268deb018d8496ffbdb76e6da9219cebd22d50 # v1.1.0

  deploy:
    needs: ci
    uses: erik73/workflows/.github/workflows/base-deploy.yaml@33268deb018d8496ffbdb76e6da9219cebd22d50 # v1.1.0
